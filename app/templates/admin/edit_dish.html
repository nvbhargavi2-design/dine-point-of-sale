{% extends "base.html" %}

{% block title %}Edit Dish - Admin{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold" style="color: var(--primary-color);">Edit Dish</h2>
                <p class="text-muted mb-0">Update information for "{{ dish.dish_name }}"</p>
            </div>
            <a href="{{ url_for('admin.dishes') }}" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-2"></i>Back to Manage Dishes
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold">Dish Details</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('admin.edit_dish', id=dish.id) }}" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category_id" class="form-label">Category</label>
                                <select class="form-select" id="category_id" name="category_id" required>
                                    <option value="" disabled>Select a category</option>
                                    {% for category in categories %}
                                        <option value="{{ category.id }}" {% if category.id == dish.category_id %}selected{% endif %}>{{ category.category_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="dish_name" class="form-label">Dish Name</label>
                                <input type="text" class="form-control" id="dish_name" name="dish_name" value="{{ dish.dish_name }}" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (₹)</label>
                            <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ dish.price }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description (Optional)</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ dish.description or '' }}</textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label for="image" class="form-label">Update Image (Optional)</label>
                            {% if dish.image %}
                            <div class="mb-2">
                                <span class="text-muted small d-block mb-1">Current Image:</span>
                                <img src="{{ dish.image }}" alt="Current Image" class="img-thumbnail" style="max-height: 100px;">
                            </div>
                            {% endif %}
                            <input class="form-control" type="file" id="image" name="image" accept="image/*">
                            <small class="text-muted">Leave blank to keep the current image.</small>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('admin.dishes') }}" class="btn btn-light">Cancel</a>
                            <button type="submit" class="btn btn-primary-custom">
                                <i class="fa-solid fa-save me-2"></i>Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
