{% extends "base.html" %}

{% block title %}My Profile - Dine POS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
                    <div class="d-inline-flex align-items-center justify-content-center bg-light rounded-circle mb-3" style="width: 80px; height: 80px;">
                        <i class="fa-solid fa-user fs-1 text-muted"></i>
                    </div>
                    <h3 class="fw-bold">My Profile</h3>
                </div>
                <div class="card-body p-4 p-md-5">
                    
                    <form method="POST" action="{{ url_for('main.profile') }}">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">MOBILE NUMBER</label>
                            <input type="text" class="form-control bg-light" value="{{ current_user.mobile }}" disabled>
                            <div class="form-text">Mobile number cannot be changed as it is used for login.</div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="name" class="form-label text-muted small fw-bold">FULL NAME</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ current_user.name if current_user.name != 'Guest' else '' }}" placeholder="Enter your name" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="email" class="form-label text-muted small fw-bold">EMAIL ADDRESS</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ current_user.email }}" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary-custom py-3">UPDATE PROFILE</button>
                        </div>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
